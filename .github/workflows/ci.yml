name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.1
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code formatting
        run: pnpm run lint

      - name: Lint
        run: pnpm run lint:es

      - name: Sync SvelteKit
        run: pnpm exec svelte-kit sync
        env:
          PUBLIC_SUPABASE_URL: http://localhost
          PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Run svelte-check
        run: pnpm run check
        env:
          PUBLIC_SUPABASE_URL: http://localhost
          PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Run unit tests
        run: pnpm run test

      - name: Build
        run: pnpm run build
        env:
          PUBLIC_SUPABASE_URL: http://localhost
          PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Get Playwright version
        shell: bash
        run: |
          echo "PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_ENV

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Run Playwright smoke suite
        run: pnpm run test:e2e
        env:
          PUBLIC_SUPABASE_URL: http://localhost
          PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
