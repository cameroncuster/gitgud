name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install --require-hashes -r scripts/requirements.txt

      - name: Validate classifier
        run: |
          python -m compileall -q scripts
          PYTHONPATH=scripts python -m unittest scripts/test_classify_problems.py
          python scripts/classify_problems.py --help > /dev/null

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.1
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v6
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code formatting
        run: pnpm run lint

      - name: Lint
        run: pnpm run lint:es

      - name: Sync SvelteKit
        run: pnpm exec svelte-kit sync
        env:
          PUBLIC_SUPABASE_URL: http://localhost
          PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Run svelte-check
        run: pnpm run check
        env:
          PUBLIC_SUPABASE_URL: http://localhost
          PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Run unit tests
        run: pnpm run test

      - name: Build
        run: pnpm run build
        env:
          PUBLIC_SUPABASE_URL: http://localhost
          PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Get Playwright version
        shell: bash
        run: |
          echo "PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_ENV

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      # Layer A — deterministic mocked suite. Always runs. The Playwright config
      # starts a local mock Supabase server and builds the app bound to it, so
      # these env values are inert placeholders (kept only to satisfy
      # $env/static/public if referenced elsewhere). No real credentials needed.
      - name: Run Playwright mocked suite
        run: pnpm run test:e2e
        env:
          PUBLIC_SUPABASE_URL: http://localhost
          PUBLIC_SUPABASE_ANON_KEY: placeholder

      # Layer B — live read-only Supabase smoke. Opt-in: runs only when both the
      # PUBLIC_SUPABASE_URL variable and the PUBLIC_SUPABASE_ANON_KEY secret are
      # configured on the repository (Settings -> Secrets and variables ->
      # Actions). It performs only anonymous reads (never a login, form
      # submission, or write) and must use the client-safe anon/publishable key
      # — NEVER a service-role key. When the key is absent the step is skipped,
      # so forks and unconfigured repos stay green. See README for the contract.
      - name: Detect live Supabase configuration
        shell: bash
        env:
          LIVE_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
          LIVE_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [[ -n "$LIVE_SUPABASE_URL" && -n "$LIVE_SUPABASE_ANON_KEY" ]]; then
            echo "LIVE_SUPABASE_CONFIGURED=true" >> "$GITHUB_ENV"
          fi

      - name: Run Playwright live read-only Supabase smoke
        if: ${{ env.LIVE_SUPABASE_CONFIGURED == 'true' }}
        run: pnpm run test:e2e
        env:
          # E2E_LIVE_ONLY makes the config build+serve only the live target (the
          # mocked layer builds into the same dir, so the two never run at once).
          SUPABASE_SMOKE: '1'
          E2E_LIVE_ONLY: '1'
          PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-node24
          path: playwright-report/
          retention-days: 7

  # Non-blocking Node 26 compatibility probe. Runs in parallel with the required
  # Node 24 job. A failure here is informational only — it cannot block merges,
  # cancel the Node 24 job, or affect branch protection status. Artifact names
  # are suffixed with the Node version to avoid upload collisions.
  node26-compat:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '26'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.1
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v6
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-node26-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-node26-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code formatting
        run: pnpm run lint

      - name: Lint
        run: pnpm run lint:es

      - name: Sync SvelteKit
        run: pnpm exec svelte-kit sync
        env:
          PUBLIC_SUPABASE_URL: http://localhost
          PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Run svelte-check
        run: pnpm run check
        env:
          PUBLIC_SUPABASE_URL: http://localhost
          PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Run unit tests
        run: pnpm run test
        env:
          PUBLIC_SUPABASE_URL: http://localhost
          PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Build
        run: pnpm run build
        env:
          PUBLIC_SUPABASE_URL: http://localhost
          PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Get Playwright version
        shell: bash
        run: |
          echo "PLAYWRIGHT_VERSION=$(pnpm exec playwright --version | sed 's/^Version //')" >> "$GITHUB_ENV"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-node26-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Run Playwright mocked suite
        run: pnpm run test:e2e
        env:
          PUBLIC_SUPABASE_URL: http://localhost
          PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-node26
          path: playwright-report/
          retention-days: 7
