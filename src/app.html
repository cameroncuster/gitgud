<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!-- Flash-prevention base styles. Deliberately does NOT redefine the color
         custom properties: those live in app.css (light :root + dark
         html[data-theme='dark']) so the persisted theme wins the cascade.
         Defining them here unlayered would override app.css's layered dark
         palette and pin the page to light. -->
    <style>
      body {
        background-color: var(--color-primary);
        color: var(--color-text);
        font-family: 'Courier New', Courier, monospace;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }
    </style>

    <!-- Apply persisted theme before first paint. Runs in <head>, so it only
         touches document.documentElement (always present) — never document.body. -->
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem('gitgud-theme');
          document.documentElement.dataset.theme = storedTheme === 'dark' ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="app">%sveltekit.body%</div>
  </body>
</html>
